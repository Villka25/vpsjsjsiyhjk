jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip p7zip-full unrar git
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server python3-pip
          pip3 install websockify

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine64 wine32
          wine --version

      # 🆕 Установка браузеров
      - name: Install browsers
        run: |
          sudo apt install -y firefox
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt update
          sudo apt install -y google-chrome-stable
          curl -s https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main"
          sudo apt update
          sudo apt install -y microsoft-edge-stable
          mkdir -p ~/Desktop
          cat > ~/Desktop/Chrome.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Google Chrome
          Exec=google-chrome-stable
          Icon=google-chrome
          Terminal=false
          EOF
          chmod +x ~/Desktop/Chrome.desktop
          cat > ~/Desktop/Edge.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Microsoft Edge
          Exec=microsoft-edge-stable
          Icon=edge
          Terminal=false
          EOF
          chmod +x ~/Desktop/Edge.desktop
          cat > ~/Desktop/Firefox.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Firefox
          Exec=firefox
          Icon=firefox
          Terminal=false
          EOF
          chmod +x ~/Desktop/Firefox.desktop

      - name: Download and extract project
        run: |
          mkdir -p ~/Project
          cd ~/Project
          wget -O archive.zip "${{ github.event.inputs.archive_url }}"
          unzip archive.zip
          rm archive.zip

      - name: Create shortcuts for .exe files
        run: |
          mkdir -p ~/Desktop
          find ~/Project -type f -name "*.exe" | while read exe; do
            name=$(basename "$exe")
            cat > ~/Desktop/"$name.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=$name
          Exec=wine "$exe"
          Icon=application-x-executable
          Terminal=false
          EOF
            chmod +x ~/Desktop/"$name.desktop"
          done
          ln -s ~/Project ~/Desktop/Project

      - name: Install noVNC and Cloudflare
        run: |
          git clone https://github.com/novnc/noVNC.git ~/noVNC
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start VNC server
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup
          vncserver :1 -geometry 1280x720 -depth 24 -localhost yes
          sleep 3

      - name: Start noVNC
        run: |
          websockify --web ~/noVNC 8080 localhost:5901 &
          sleep 3

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 --protocol http2 2>&1 | tee /tmp/cf.log &
          sleep 5
          for i in {1..30}; do
            URL=$(grep -o 'https://[a-zA-Z0-9\-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "============================================================"
              echo "✅ Cloudflare Tunnel is ready!"
              echo ""
              echo "🌐 Open in your browser:"
              echo "   $URL/vnc.html?password=secret"
              echo ""
              echo "🔑 Password: secret"
              echo "📍 Your files: ~/Project (Desktop shortcut 'Project')"
              echo "   .exe shortcuts are on the Desktop"
              echo "   Браузеры: Chrome, Edge, Firefox — ярлыки на рабочем столе"
              echo "============================================================"
              break
            fi
            echo "Waiting for tunnel (attempt $i)..."
            sleep 2
          done

      - name: Keep runner alive
        run: sleep 6h
