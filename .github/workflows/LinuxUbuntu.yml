name: Ubuntu Desktop (noVNC via Cloudflare)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Install desktop, VNC, noVNC and cloudflared
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server
          sudo apt install -y git python3 python3-pip
          pip3 install websockify
          git clone https://github.com/novnc/noVNC.git ~/noVNC
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Setup VNC password and xstartup
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup

      - name: Start VNC server
        run: |
          vncserver :1 -geometry 1280x720 -depth 24 -localhost yes
          sleep 3

      - name: Start noVNC (websockify)
        run: |
          websockify --web ~/noVNC 8080 localhost:5901 &
          sleep 3

      - name: Expose noVNC via Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 &
          sleep 10
          echo "============================================================"
          echo "✅ Cloudflare Tunnel is running."
          echo ""
          echo "🌐 Open this URL in your browser:"
          echo "   (Look for the line with 'trycloudflare.com' in the logs above)"
          echo ""
          echo "   Example: https://random-name.trycloudflare.com"
          echo ""
          echo "   Then add /vnc.html?password=secret to the URL, e.g.:"
          echo "   https://random-name.trycloudflare.com/vnc.html?password=secret"
          echo ""
          echo "🔑 VNC password: secret"
          echo "============================================================"
          sleep 6h
