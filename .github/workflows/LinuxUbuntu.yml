name: Ubuntu Desktop (VNC via Cloudflare Tunnel)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Install desktop and VNC components
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Setup VNC password and xstartup
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup

      - name: Start VNC server
        run: |
          vncserver :1 -geometry 1280x720 -depth 24 -localhost yes
          sleep 3
          if ! pgrep -x Xtigervnc > /dev/null; then
            echo "ERROR: VNC server failed to start!"
            exit 1
          fi

      - name: Expose VNC via Cloudflare Tunnel (TCP)
        run: |
          cloudflared tunnel --url tcp://localhost:5901 &
          sleep 10
          echo "============================================================"
          echo "Cloudflare tunnel is running."
          echo "Look for a line like: 'tcp://random-name.trycloudflare.com:12345'"
          echo "Connect your VNC client to that address."
          echo "Password: secret"
          echo "============================================================"
          # Keep the job alive so the tunnel stays open
          sleep 6h
