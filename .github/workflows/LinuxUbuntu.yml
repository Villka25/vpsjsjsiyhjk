name: Unity 6000 LTS + Wine + Project Setup

on:
  workflow_dispatch:
    inputs:
      project_url:
        description: 'Ссылка на архив проекта (catbox.moe)'
        required: true
        default: 'https://files.catbox.moe/51xx79.zip'
      archive_type:
        description: 'Тип архива (zip, rar, 7z)'
        required: true
        default: 'zip'
      unity_version:
        description: 'Версия Unity 6000 (например 6000.0.70f1)'
        required: false
        default: '6000.0.70f1'
      unity_changeset:
        description: 'Changeset для версии Unity'
        required: false
        default: '0d9e1a373c8b'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Базовая подготовка системы
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip p7zip-full unrar git
          sudo apt install -y libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libgl1-mesa-dev libdbus-glib-1-2 libgtk-3-0 libnss3 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrender1 libxtst6

      # 2. Установка Wine (для запуска .exe)
      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine64 wine32
          wine --version

      # 3. Установка Unity Hub
      - name: Install Unity Hub
        run: |
          wget -qO - https://hub.unity3d.com/linux/keys/public | sudo gpg --dearmor | sudo tee /usr/share/keyrings/Unity_Technologies_ApS.gpg > /dev/null
          sudo sh -c 'echo "deb [signed-by=/usr/share/keyrings/Unity_Technologies_ApS.gpg] https://hub.unity3d.com/linux/repos/deb stable main" > /etc/apt/sources.list.d/unityhub.list'
          sudo apt update
          sudo apt install -y unityhub

      # 4. Установка Unity 6000 LTS
      - name: Install Unity ${{ github.event.inputs.unity_version }}
        run: |
          unityhub --headless install --version ${{ github.event.inputs.unity_version }} --changeset ${{ github.event.inputs.unity_changeset }}
          echo "✅ Unity ${{ github.event.inputs.unity_version }} установлен"

      # 5. Скачивание и распаковка архива проекта
      - name: Download and extract project
        run: |
          mkdir -p ~/UnityProject
          cd ~/UnityProject
          case "${{ github.event.inputs.archive_type }}" in
            zip)
              wget -O project.zip "${{ github.event.inputs.project_url }}"
              unzip project.zip
              rm project.zip
              ;;
            rar)
              wget -O project.rar "${{ github.event.inputs.project_url }}"
              unrar x project.rar
              rm project.rar
              ;;
            7z)
              wget -O project.7z "${{ github.event.inputs.project_url }}"
              7z x project.7z -o.
              rm project.7z
              ;;
            *)
              echo "❌ Неподдерживаемый тип архива"
              exit 1
              ;;
          esac
          echo "✅ Проект распакован в ~/UnityProject"

      # 6. Поиск .exe файлов и создание ярлыков для запуска через Wine
      - name: Find and create shortcuts for .exe files
        run: |
          mkdir -p ~/Desktop
          find ~/UnityProject -type f -name "*.exe" | while read exe; do
            name=$(basename "$exe")
            cat > ~/Desktop/"$name.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=$name
          Exec=wine "$exe"
          Icon=application-x-executable
          Terminal=false
          EOF
            chmod +x ~/Desktop/"$name.desktop"
            echo "✅ Ярлык создан для $name"
          done

      # 7. Настройка переменных окружения и ярлыка для Unity
      - name: Setup environment and desktop shortcuts
        run: |
          echo "export UNITY_PATH=~/Unity/Hub/Editor/${{ github.event.inputs.unity_version }}/Editor/Unity" >> ~/.bashrc
          echo "export PROJECT_PATH=~/UnityProject" >> ~/.bashrc
          ln -s ~/UnityProject ~/Desktop/UnityProject
          cat > ~/Desktop/open_project.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Open Unity Project
          Exec=~/Unity/Hub/Editor/${{ github.event.inputs.unity_version }}/Editor/Unity -projectPath ~/UnityProject
          Icon=unity
          Terminal=false
          EOF
          chmod +x ~/Desktop/open_project.desktop
          echo "✅ Ярлыки для Unity и проекта созданы"

      # 8. Установка noVNC и запуск VNC + Cloudflare Tunnel
      - name: Install noVNC and Cloudflare
        run: |
          sudo apt install -y python3-pip
          pip3 install websockify
          git clone https://github.com/novnc/noVNC.git ~/noVNC
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start VNC server
        run: |
          sudo apt install -y tigervnc-standalone-server xfce4 xfce4-goodies
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup
          vncserver :1 -geometry 1280x720 -depth 24 -localhost yes
          sleep 3

      - name: Start noVNC
        run: |
          websockify --web ~/noVNC 8080 localhost:5901 &
          sleep 3

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 --protocol http2 2>&1 | tee /tmp/cf.log &
          sleep 5
          for i in {1..30}; do
            URL=$(grep -o 'https://[a-zA-Z0-9\-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "============================================================"
              echo "✅ Cloudflare Tunnel is ready!"
              echo ""
              echo "🌐 Open in your browser:"
              echo "   $URL/vnc.html?password=secret"
              echo ""
              echo "🔑 VNC password: secret"
              echo "📍 Project path: ~/UnityProject"
              echo "📍 Unity version: ${{ github.event.inputs.unity_version }}"
              echo "📍 Wine: installed, .exe shortcuts on Desktop"
              echo "============================================================"
              break
            fi
            echo "Waiting for tunnel (attempt $i)..."
            sleep 2
          done

      - name: Keep runner alive
        run: sleep 6h
