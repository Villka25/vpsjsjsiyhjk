name: Wine + Project Files (no Unity)

on:
  workflow_dispatch:
    inputs:
      archive_url:
        description: 'Ссылка на архив с файлами (catbox.moe)'
        required: true
        default: 'https://files.catbox.moe/51xx79.zip'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip p7zip-full unrar git
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server python3-pip
          pip3 install websockify

      # Установка Wine
      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine64 wine32
          wine --version

      # Скачивание и распаковка архива
      - name: Download and extract project
        run: |
          mkdir -p ~/Project
          cd ~/Project
          wget -O archive.zip "${{ github.event.inputs.archive_url }}"
          unzip archive.zip
          rm archive.zip
          echo "✅ Файлы распакованы в ~/Project"

      # Создание ярлыков для всех .exe
      - name: Create shortcuts for .exe files
        run: |
          mkdir -p ~/Desktop
          find ~/Project -type f -name "*.exe" | while read exe; do
            name=$(basename "$exe")
            cat > ~/Desktop/"$name.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=$name
          Exec=wine "$exe"
          Icon=application-x-executable
          Terminal=false
          EOF
            chmod +x ~/Desktop/"$name.desktop"
          done
          ln -s ~/Project ~/Desktop/Project

      # noVNC + Cloudflare Tunnel
      - name: Install noVNC and Cloudflare
        run: |
          git clone https://github.com/novnc/noVNC.git ~/noVNC
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start VNC server
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup
          vncserver :1 -geometry 1280x720 -depth 24 -localhost yes
          sleep 3

      - name: Start noVNC
        run: |
          websockify --web ~/noVNC 8080 localhost:5901 &
          sleep 3

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 --protocol http2 2>&1 | tee /tmp/cf.log &
          sleep 5
          for i in {1..30}; do
            URL=$(grep -o 'https://[a-zA-Z0-9\-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "============================================================"
              echo "✅ Cloudflare Tunnel is ready!"
              echo ""
              echo "🌐 Open in your browser:"
              echo "   $URL/vnc.html?password=secret"
              echo ""
              echo "🔑 Password: secret"
              echo "📍 Your files: ~/Project (Desktop shortcut 'Project')"
              echo "   .exe shortcuts are on the Desktop"
              echo "============================================================"
              break
            fi
            echo "Waiting for tunnel (attempt $i)..."
            sleep 2
          done

      - name: Keep runner alive
        run: sleep 6h
