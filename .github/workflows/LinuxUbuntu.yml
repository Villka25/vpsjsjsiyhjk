name: Ubuntu Desktop (VNC via bore) - Fixed

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Install desktop and VNC components
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common

      - name: Install bore
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/
          rm bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz

      - name: Setup VNC password and xstartup
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup

      - name: Start VNC server
        run: |
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no
          sleep 3
          # Проверка, что процесс запущен
          if ! pgrep -x Xtigervnc > /dev/null; then
            echo "ERROR: VNC server failed to start!"
            exit 1
          fi

      - name: Expose VNC via bore
        run: |
          bore local 5901 --to bore.pub &
          sleep 5
          echo "============================================="
          echo "Connect your VNC viewer to bore.pub:<port>"
          echo "Password: secret"
          echo "The exact port will be shown in the lines above."
          echo "============================================="

      - name: Keep runner alive
        run: sleep 6h
