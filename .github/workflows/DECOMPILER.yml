name: Декомпиляция v85det.unity3d

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файл
        run: |
          curl -L -o input.unity3d "https://files.catbox.moe/v85det.unity3d"
          size=$(stat -c %s input.unity3d)
          echo "Размер: $size байт"
          file input.unity3d
          head -c 200 input.unity3d | xxd

      - name: Установка Python и UnityPy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Извлечение ресурсов
        run: |
          pip install UnityPy
          python -c "
          import UnityPy, os

          env = UnityPy.load('input.unity3d')
          os.makedirs('output', exist_ok=True)
          count = 0

          for obj in env.objects:
              try:
                  data = obj.read()
                  # Пытаемся сохранить с явным путём – работает для текстур, мешей и т.д.
                  data.save(os.path.join('output', f'{obj.type.name}_{obj.path_id}'))
                  count += 1
              except TypeError:
                  # Объекты вроде MonoScript не принимают путь – пропускаем
                  continue
              except Exception as e:
                  print(f'Не удалось сохранить {obj}: {e}')

          print(f'Сохранено объектов: {count}')
          "

      - name: Проверка результата
        run: |
          echo "Файлов в output: $(find output -type f | wc -l)"
          ls -la output/

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-v85det
          path: output/
