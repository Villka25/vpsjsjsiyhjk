name: Декомпиляция .unity3d с catbox

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'https://files.catbox.moe/v85det.unity3d'
        required: true
        type: string

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файл
        run: |
          echo "Загружаем: ${{ github.event.inputs.file_url }}"
          curl -L -o input.unity3d "${{ github.event.inputs.file_url }}"
          size=$(stat -c %s input.unity3d)
          echo "Размер файла: $size байт"
          if [ $size -lt 10240 ]; then
            echo "Файл слишком маленький! Похоже, скачалась страница, а не сам файл. Проверьте, что ссылка прямая (должна заканчиваться на .unity3d)."
            head -c 500 input.unity3d
            exit 1
          fi
          file input.unity3d
          head -c 200 input.unity3d | xxd

      - name: Установка Python и UnityPy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Попытка декомпиляции через UnityPy
        continue-on-error: true
        run: |
          pip install UnityPy
          python -c "
          import UnityPy, os
          env = UnityPy.load('input.unity3d')
          os.makedirs('output_unitypy', exist_ok=True)
          for path, obj in env.container.items():
              data = obj.read()
              safe = path.replace('/', '_')
              data.save(os.path.join('output_unitypy', safe))
          print('UnityPy: объекты извлечены в output_unitypy')
          "

      - name: Попытка декомпиляции через AssetRipper CLI
        if: always()
        run: |
          wget -q https://github.com/AssetRipper/AssetRipper/releases/download/0.3.1.2/AssetRipper_linux_x64.zip
          unzip -q AssetRipper_linux_x64.zip -d ripper
          chmod +x ripper/AssetRipperConsole
          ./ripper/AssetRipperConsole input.unity3d -o output_ripper || echo "AssetRipperConsole завершился с ошибкой"

      - name: Сбор результатов
        if: always()
        run: |
          mkdir -p final_output
          cp -r output_unitypy/* final_output/ 2>/dev/null || true
          cp -r output_ripper/* final_output/ 2>/dev/null || true
          echo "Извлечено файлов: $(find final_output -type f | wc -l)"

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: extracted-assets
          path: final_output/
