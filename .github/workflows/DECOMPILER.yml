name: Декомпиляция v85det.unity3d

on:
  workflow_dispatch:   # запускается вручную

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файл по фиксированной ссылке
        run: |
          echo "Загружаем https://files.catbox.moe/v85det.unity3d"
          curl -L -o input.unity3d "https://files.catbox.moe/v85det.unity3d"
          size=$(stat -c %s input.unity3d)
          echo "Размер файла: $size байт"
          if [ $size -lt 10240 ]; then
            echo "Файл слишком маленький — возможно, скачалась не та страница."
            head -c 500 input.unity3d
            exit 1
          fi
          file input.unity3d
          echo "=== Первые 200 байт ==="
          head -c 200 input.unity3d | xxd

      - name: Установка Python и UnityPy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Декомпиляция через UnityPy (правильный экспорт)
        run: |
          pip install UnityPy
          python -c "
          import UnityPy, os
          env = UnityPy.load('input.unity3d')
          os.makedirs('output', exist_ok=True)
          # Рекурсивно экспортируем всё
          env.export('output')
          print('Экспорт завершён.')
          "

      - name: Проверка результата
        run: |
          echo "Файлов в output: $(find output -type f | wc -l)"
          ls -la output/ || echo "Папка output пуста"

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-v85det
          path: output/
