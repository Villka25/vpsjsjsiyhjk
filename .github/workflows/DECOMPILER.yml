name: Декомпиляция .unity3d (UnityPy)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'https://files.catbox.moe/v85det.unity3d'
        required: true
        type: string

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файл
        run: |
          wget -O input.unity3d "${{ github.event.inputs.file_url }}"

      - name: Установка Python и UnityPy
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка UnityPy
        run: pip install unitypy

      - name: Декомпиляция
        run: |
          python -c "
          import os, unitypy
          env = unitypy.Environment()
          env.load_file('input.unity3d')
          os.makedirs('output', exist_ok=True)
          for obj in env.objects:
              try:
                  data = obj.read()
                  data.export('output')
              except Exception as e:
                  print(f'Не удалось экспортировать объект {obj}: {e}')
          print('Готово. Результат в папке output.')
          "

      - name: Загрузить результат
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-unity3d
          path: output/
