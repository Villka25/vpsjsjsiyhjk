name: Декомпиляция v85det.unity3d (AssetRipper Mono)

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файл
        run: |
          curl -L -o input.unity3d "https://files.catbox.moe/v85det.unity3d"
          echo "Размер: $(stat -c %s input.unity3d) байт"
          file input.unity3d

      - name: Установка .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Скачиваем AssetRipper CLI (последняя версия)
        run: |
          wget -q "https://github.com/AssetRipper/AssetRipper/releases/download/1.2.3/AssetRipper_linux_x64_CLI.zip"
          unzip -q AssetRipper_linux_x64_CLI.zip -d ripper
          chmod +x ripper/AssetRipper.CLI

      - name: Декомпиляция
        run: |
          mkdir output
          ./ripper/AssetRipper.CLI input.unity3d -o output

      - name: Проверка результата
        run: |
          echo "Извлечено файлов: $(find output -type f | wc -l)"
          ls -la output/

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-v85det-mono
          path: output/
