name: Unity Server (bore)

on:
  workflow_dispatch:   # запускаешь вручную на вкладке Actions

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libstdc++6 wget unzip

      - name: Download server build
        run: |
          # Замени ссылку на свой актуальный build.zip (catbox, GitHub Releases, что угодно)
          wget -O build.zip "https://files.catbox.moe/4yd0xw.zip"
          unzip build.zip -d server
          rm build.zip
          chmod +x server/buildaa.x86_64

      - name: Install bore
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/
          rm bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz

      - name: Start game server
        run: |
          cd server
          ./buildaa.x86_64 -batchmode -nographics -port 7777 &
          sleep 3

      - name: Expose server via bore
        run: |
          bore local 7777 --to bore.pub &
          sleep 5
          echo "============================================"
          echo "Сервер запущен. Подключайся по адресу:"
          echo "bore.pub (порт будет в логах ниже)"
          echo "============================================"

      - name: Keep alive (max 6 hours)
        run: sleep 6h
