name: Ubuntu Desktop (via Cloudflare Tunnel)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Install Desktop & VNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Configure VNC password
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start VNC server
        run: |
          vncserver :1 -geometry 1280x720 -depth 24
          sleep 3

      - name: Expose VNC via Cloudflare Tunnel
        run: |
          cloudflared tunnel --url localhost:5901 --protocol tcp &

      - name: Get Cloudflare Tunnel URL
        run: |
          sleep 10
          echo "Your VNC address will be displayed in the logs above (format: tcp://some-name.trycloudflare.com:port)"
          echo "Connect using any VNC client."

      - name: Keep runner alive
        run: sleep 6h
