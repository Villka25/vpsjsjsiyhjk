name: Ubuntu GUI Desktop on GitHub Actions

on:
  workflow_dispatch:  # запуск вручную

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Install desktop environment and VNC server
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver
          # Установим ngrok
          wget https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/

      - name: Configure VNC password
        run: |
          # Устанавливаем пароль "secret" (можно изменить, но тогда запомните)
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start VNC server on display :1
        run: |
          vncserver :1 -geometry 1280x720 -depth 24
          # Ждём запуска
          sleep 3

      - name: Expose VNC via ngrok
        run: |
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 5901 &
          sleep 5
          echo "Public VNC address:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'

      - name: Keep runner alive
        run: sleep 6h
