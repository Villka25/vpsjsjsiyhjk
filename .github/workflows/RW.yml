name: RW-HPS Server with bore

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download & extract RW-HPS
        run: |
          wget -O RW-HPS.zip https://github.com/RW-HPS/RW-HPS/releases/download/v3.0.0/3.0.0.zip
          unzip RW-HPS.zip -d RW-HPS
          if [ -d RW-HPS/3.0.0 ]; then
            mv RW-HPS/3.0.0/* RW-HPS/
            rmdir RW-HPS/3.0.0
          fi
          ls -la RW-HPS
          cat RW-HPS/start.bat || echo "start.bat not found"

      - name: Create missing BindConfig.json
        run: |
          mkdir -p RW-HPS/data
          cat > RW-HPS/data/BindConfig.json << EOF
          {
            "host": "0.0.0.0",
            "port": 5123
          }
          EOF
          echo "✅ BindConfig.json created:"
          cat RW-HPS/data/BindConfig.json

      - name: Start RW-HPS server (with start command)
        run: |
          cd RW-HPS
          JAR=$(find . -name "Server-All.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "❌ Server-All.jar not found!"
            exit 1
          fi
          echo "✅ Found JAR: $JAR"
          # Подаём команду "start" и держим stdin открытым через cat
          ( echo "start"; cat ) | nohup java -Djava.net.preferIPv4Stack=true -Xmx2G -jar "$JAR" --agree > server.log 2>&1 &
          sleep 30
          ss -tlnp | grep 5123 && echo "✅ Port 5123 is listening" || echo "⚠️ Port not yet open"
          tail -50 server.log
          pgrep -f Server-All.jar && echo "✅ Server process is alive" || echo "❌ Server process died"

      - name: Install bore (v0.6.0)
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/
          rm bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz
          bore --version

      - name: Expose server via bore (auto-restart)
        run: |
          (
            while true; do
              echo "$(date) - Bore tunnel starting..."
              bore local 5123 --to bore.pub 2>&1 | while IFS= read -r line; do
                echo "$line"
                if [[ "$line" == *"listening at bore.pub:"* ]]; then
                  PORT=$(echo "$line" | grep -oP 'bore\.pub:\K\d+')
                  echo "============================================"
                  echo "✅ RW-HPS сервер доступен: bore.pub:$PORT"
                  echo "============================================"
                fi
              done
              echo "$(date) - Bore exited, restarting in 5s..."
              sleep 5
            done
          ) &
          sleep 10
          echo "Туннель запущен."

      - name: Keep alive (6h)
        run: sleep 6h

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            RW-HPS/server.log
            RW-HPS/data/logs/
            RW-HPS/data/BindConfig.json
