name: Build 3D Game (C++ SFML OpenGL)

on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y libsfml-dev

      - name: Install Windows dependencies (vcpkg)
        if: runner.os == 'Windows'
        run: |
          vcpkg install sfml:x64-windows
          vcpkg integrate install

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-${{ runner.os }}
          path: |
            ${{ runner.os == 'Windows' && 'build/Release/3dgame.exe' || 'build/3dgame' }}
