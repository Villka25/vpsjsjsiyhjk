name: Build Load Tester

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Compile
        shell: cmd
        run: |
          cl main.cpp /O2 /MT /FeLoadTester.exe user32.lib comctl32.lib iphlpapi.lib ws2_32.lib
      - uses: actions/upload-artifact@v4
        with:
          name: LoadTester.exe
          path: LoadTester.exe
