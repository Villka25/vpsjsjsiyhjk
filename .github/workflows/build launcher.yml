name: Build SYSTEM ANODE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile SYSTEM ANODE
        run: |
          g++ -static -O2 system_anode.cpp -o system_anode.exe -lgdi32 -luser32

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: system-anode
          path: system_anode.exe
