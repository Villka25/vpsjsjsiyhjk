name: Unity Server (Pinggy)

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libstdc++6 wget unzip openssh-client

      - name: Download server build
        run: |
          wget -O build.zip "https://files.catbox.moe/mh50o5.zip"
          unzip build.zip -d server
          rm build.zip
          chmod +x server/buildaa.x86_64

      - name: Start game server
        run: |
          cd server
          ./buildaa.x86_64 -batchmode -nographics -port 7777 &
          sleep 3

      - name: Expose server via Pinggy (TCP, auto-restart)
        run: |
          (
            while true; do
              echo "Запуск TCP-туннеля Pinggy..."
              ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:7777 tcp@a.pinggy.io 2>&1 | while IFS= read -r line; do
                echo "$line"
                if [[ "$line" == *"tcp://"* ]]; then
                  ADDR=$(echo "$line" | grep -oP 'tcp://\K[^ ]+')
                  echo "============================================"
                  echo "Сервер доступен: $ADDR"
                  echo "============================================"
                fi
              done
              echo "Туннель упал, перезапуск через 5 секунд..."
              sleep 5
            done
          ) &
          sleep 10
          echo "Туннель Pinggy запущен, адрес смотри выше"

      - name: Keep alive (max 6 hours)
        run: sleep 6h
