name: Unity Server (serveo)

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libstdc++6 wget unzip ssh

      - name: Download server build
        run: |
          wget -O build.zip "https://files.catbox.moe/4yd0xw.zip"
          unzip build.zip -d server
          rm build.zip
          chmod +x server/buildaa.x86_64

      - name: Start game server
        run: |
          cd server
          ./buildaa.x86_64 -batchmode -nographics -port 7777 &
          sleep 3

      - name: Expose via serveo
        run: |
          ssh -o StrictHostKeyChecking=no -R 0:localhost:7777 serveo.net 2>&1 | while IFS= read -r line; do
            echo "$line"
            if [[ "$line" == *"Forwarding TCP connections from serveo.net:"* ]]; then
              ADDR=$(echo "$line" | grep -oP 'serveo\.net:\d+')
              echo "============================================"
              echo "Сервер доступен: $ADDR"
              echo "============================================"
            fi
          done &
          sleep 10
          echo "Адрес сервера смотри выше в логах"

      - name: Keep alive (max 6 hours)
        run: sleep 6h
