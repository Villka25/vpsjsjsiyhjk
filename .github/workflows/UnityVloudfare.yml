name: Unity Server (playit.gg)

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      # 1. Установка системных зависимостей
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libstdc++6 wget unzip

      # 2. Скачиваем серверный билд (замени ссылку на актуальный build.zip)
      - name: Download server build
        run: |
          wget -O build.zip "https://files.catbox.moe/4yd0xw.zip"
          unzip build.zip -d server
          rm build.zip
          chmod +x server/buildaa.x86_64

      # 3. Устанавливаем playit agent (рабочая версия)
      - name: Install playit
        run: |
          wget -q -O playit https://github.com/playit-cloud/playit-agent/releases/download/v1.0.4/playit-linux-amd64
          chmod +x playit

      # 4. Запускаем игровой сервер Unity
      - name: Start game server
        run: |
          cd server
          ./buildaa.x86_64 -batchmode -nographics -port 7777 &
          sleep 3

      # 5. Создаём туннель playit (без секрета — будет показан Claim Code)
      - name: Start playit tunnel
        run: |
          mkdir -p /tmp/playit
          ./playit --socket-path /tmp/playit/playit.sock 2>&1 | tee playit.log &
          sleep 5
          echo "============================================"
          echo "Claim Code (скопируй и введи на https://playit.gg/claim):"
          grep -oP 'Claim Code: \K[\w-]+' playit.log || echo "Если код не появился, смотри полные логи выше"
          echo "============================================"
          echo "После ввода кода адрес сервера появится в панели playit.gg (раздел Tunnels)"
          echo "Адрес будет постоянным, порт вида something.playit.gg:XXXXX"

      # 6. Держим workflow активным до 6 часов
      - name: Keep alive (max 6 hours)
        run: sleep 6h
