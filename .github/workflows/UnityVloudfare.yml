name: Unity Server (playit.gg)

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      # 1. Установка системных зависимостей
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libstdc++6 wget unzip

      # 2. Скачиваем серверный билд (замените ссылку на актуальный build.zip)
      - name: Download server build
        run: |
          wget -O build.zip "https://files.catbox.moe/4yd0xw.zip"
          unzip build.zip -d server
          rm build.zip
          chmod +x server/buildaa.x86_64

      # 3. Устанавливаем playit agent (конкретная рабочая версия)
      - name: Install playit
        run: |
          wget -q -O playit https://github.com/playit-cloud/playit-agent/releases/download/v1.0.4/playit-linux-amd64
          chmod +x playit

      # 4. Запускаем игровой сервер Unity
      - name: Start game server
        run: |
          cd server
          ./buildaa.x86_64 -batchmode -nographics -port 7777 &
          sleep 3

      # 5. Создаём туннель playit (используем секрет и безопасную папку для сокета)
      - name: Start playit tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          mkdir -p /tmp/playit
          ./playit --secret "$PLAYIT_SECRET" --socket-path /tmp/playit/playit.sock &
          sleep 5
          echo "Сервер доступен по адресу из панели playit.gg (порт 7777 проброшен)"

      # 6. Держим workflow активным до 6 часов
      - name: Keep alive (max 6 hours)
        run: sleep 6h
