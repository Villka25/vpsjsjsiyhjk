name: Unity Server (playit.gg)

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libstdc++6 wget unzip

      - name: Download server build
        run: |
          wget -O build.zip "https://files.catbox.moe/4yd0xw.zip"
          unzip build.zip -d server
          rm build.zip
          chmod +x server/buildaa.x86_64

      - name: Install playit
        run: |
          curl -fsSL https://playit.gg/downloads/playit-linux-amd64 -o playit
          chmod +x playit

      - name: Start game server
        run: |
          cd server
          ./buildaa.x86_64 -batchmode -nographics -port 7777 &
          sleep 3

      - name: Start playit tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "$PLAYIT_SECRET" > secret.txt
          ./playit --secret-file secret.txt &
          sleep 5
          echo "Сервер запущен. Адрес для подключения указан в панели playit.gg"

      - name: Keep alive (max 6 hours)
        run: sleep 6h
