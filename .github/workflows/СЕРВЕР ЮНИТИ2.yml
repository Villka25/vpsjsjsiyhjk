name: Windows VNC (no downloads)

on:
  workflow_dispatch:

jobs:
  vnc:
    runs-on: windows-latest
    steps:
      - name: Install TightVNC
        shell: pwsh
        run: |
          $url = "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\tightvnc.msi"
          Start-Process msiexec -ArgumentList "/i `"$env:TEMP\tightvnc.msi`" /quiet /qn /norestart" -Wait
          Remove-Item "$env:TEMP\tightvnc.msi"
          # Добавляем в PATH
          $env:Path += ";C:\Program Files\TightVNC"
          [Environment]::SetEnvironmentVariable("Path", $env:Path, "Machine")
          Write-Host "TightVNC installed"

      - name: Set VNC password
        shell: pwsh
        run: |
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlapp -setpassword secret
          Write-Host "Password set to 'secret'"

      - name: Start VNC server
        shell: pwsh
        run: |
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlapp -start
          Start-Sleep -Seconds 3
          Write-Host "VNC server running on port 5900"

      - name: Install Python and websockify
        shell: pwsh
        run: |
          if (!(Get-Command python -ErrorAction SilentlyContinue)) {
            choco install python --yes
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          }
          python -m pip install --upgrade pip
          python -m pip install websockify
          Write-Host "websockify installed"

      - name: Clone noVNC
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git C:\noVNC
          Write-Host "noVNC cloned"

      - name: Start websockify
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "python" -ArgumentList "-m websockify --web C:\noVNC 8080 localhost:5900"
          Start-Sleep -Seconds 3
          Write-Host "websockify running on port 8080"

      - name: Install cloudflared
        shell: pwsh
        run: |
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "C:\cloudflared.exe"
          Write-Host "cloudflared installed"

      - name: Expose via Cloudflare
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:8080 --protocol http2"
          Start-Sleep -Seconds 10
          Write-Host "============================================================"
          Write-Host "Cloudflare Tunnel is running."
          Write-Host "Look for a URL like: https://random-name.trycloudflare.com"
          Write-Host "Open in browser: https://random-name.trycloudflare.com/vnc.html?password=secret"
          Write-Host "VNC password: secret"
          Write-Host "============================================================"

      - name: Keep runner alive
        shell: pwsh
        run: Start-Sleep -Seconds 21600
