name: Stalker Level → Unity Build

on:
  workflow_dispatch:
    inputs:
      level_url:
        description: 'Ссылка на ZIP-архив с папкой уровня (catbox.moe)'
        required: true
        default: 'https://files.catbox.moe/lt4940.zip'

jobs:
  convert_and_build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip python3-pip
          pip3 install numpy

      - name: Install Blender 3.6.5 LTS
        run: |
          wget -q https://download.blender.org/release/Blender3.6/blender-3.6.5-linux-x64.tar.xz
          tar -xf blender-3.6.5-linux-x64.tar.xz
          sudo mv blender-3.6.5-linux-x64 /opt/blender-3.6
          export PATH=/opt/blender-3.6:$PATH
          echo "export PATH=/opt/blender-3.6:$PATH" >> ~/.bashrc
          /opt/blender-3.6/blender --version

      - name: Install blender-xray plugin
        run: |
          BLENDER_VER="3.6"
          git clone --depth 1 https://github.com/PavelBlend/blender-xray.git ~/blender-xray
          mkdir -p ~/.config/blender/$BLENDER_VER/scripts/addons/
          cp -r ~/blender-xray/io_scene_xray ~/.config/blender/$BLENDER_VER/scripts/addons/
          # Проверяем, что файл __init__.py есть
          if [ ! -f ~/.config/blender/$BLENDER_VER/scripts/addons/io_scene_xray/__init__.py ]; then
            echo "❌ Плагин не установлен корректно"
            exit 1
          fi
          echo "✅ blender-xray installed"

      - name: Download and extract level
        run: |
          mkdir -p ~/level
          cd ~/level
          curl -L --retry 5 --retry-delay 10 -o level.zip "${{ github.event.inputs.level_url }}"
          if [ ! -s level.zip ]; then
            echo "❌ Загрузка не удалась: файл пуст"
            exit 1
          fi
          unzip -o level.zip
          rm level.zip
          if ! find . -type f -name "level" ! -name "*.*" | grep -q .; then
            echo "❌ Файл 'level' не найден"
            exit 1
          fi
          echo "✅ Уровень распакован"

      - name: Convert .level to .fbx
        run: |
          cd ~/level
          LEVEL_FILE=$(find . -type f -name "level" ! -name "*.*" | head -1)
          echo "Найден файл уровня: $LEVEL_FILE"
          cat > convert.py << 'EOF'
          import bpy
          import sys
          import os
          # Включаем аддон
          bpy.ops.preferences.addon_enable(module="io_scene_xray")
          level_path = sys.argv[-2]
          output_path = sys.argv[-1]
          bpy.ops.wm.read_homefile(use_empty=True)
          # Повторно включаем после сброса сцены
          bpy.ops.preferences.addon_enable(module="io_scene_xray")
          bpy.ops.import_scene.xray_level(filepath=level_path)
          bpy.ops.export_scene.fbx(filepath=output_path, use_selection=False)
          print("✅ Export done")
          EOF
          /opt/blender-3.6/blender --background --python convert.py -- "$LEVEL_FILE" "level.fbx"
          if [ ! -f "level.fbx" ]; then
            echo "❌ Ошибка: level.fbx не создан"
            exit 1
          fi
          echo "✅ Конвертация успешна"

      - name: Upload FBX artifact
        uses: actions/upload-artifact@v4
        with:
          name: level_fbx
          path: ~/level/level.fbx

      - name: Install Unity
        run: |
          wget -qO - https://hub.unity3d.com/linux/keys/public | sudo gpg --dearmor | sudo tee /usr/share/keyrings/Unity_Technologies_ApS.gpg > /dev/null
          sudo sh -c 'echo "deb [signed-by=/usr/share/keyrings/Unity_Technologies_ApS.gpg] https://hub.unity3d.com/linux/repos/deb stable main" > /etc/apt/sources.list.d/unityhub.list'
          sudo apt update
          sudo apt install -y unityhub
          unityhub --headless install --version 2022.3.22f1 --changeset b9e6963d9e67

      - name: Setup Unity project
        run: |
          mkdir -p ~/UnityProject/Assets
          mkdir -p ~/UnityProject/ProjectSettings
          cp ~/level/level.fbx ~/UnityProject/Assets/
          cat > ~/UnityProject/ProjectSettings/ProjectVersion.txt << EOF
          m_EditorVersion: 2022.3.22f1
          m_EditorVersionWithRevision: 2022.3.22f1 (b9e6963d9e67)
          EOF
          mkdir -p ~/UnityProject/Assets/Editor
          cat > ~/UnityProject/Assets/Editor/BuildScript.cs << 'EOF'
          using UnityEditor;
          using UnityEngine;
          using System.IO;
          public class BuildScript
          {
              public static void Build()
              {
                  EditorApplication.NewScene();
                  string fbxPath = "Assets/level.fbx";
                  if (File.Exists(fbxPath))
                  {
                      GameObject model = AssetDatabase.LoadAssetAtPath<GameObject>(fbxPath);
                      if (model != null) GameObject.Instantiate(model);
                  }
                  string scenePath = "Assets/LevelScene.unity";
                  EditorApplication.SaveScene(scenePath);
                  string[] scenes = { scenePath };
                  BuildPipeline.BuildPlayer(
                      scenes,
                      "build/Game.exe",
                      BuildTarget.StandaloneWindows64,
                      BuildOptions.None
                  );
              }
          }
          EOF

      - name: Build Unity project
        run: |
          cd ~/UnityProject
          ~/Unity/Hub/Editor/2022.3.22f1/Editor/Unity \
            -batchmode -nographics -quit \
            -projectPath . \
            -executeMethod BuildScript.Build
          if [ ! -d "build" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity_game_build
          path: ~/UnityProject/build/
