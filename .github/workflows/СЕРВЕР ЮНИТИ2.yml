name: Windows RDP + noVNC

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    steps:
      # 1. Включаем RDP и устанавливаем пароль
      - name: Enable RDP and set password
        shell: pwsh
        run: |
          # Включаем RDP в реестре
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          # Разрешаем RDP в фаерволе
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes
          # Устанавливаем пароль для текущего пользователя (runneradmin)
          $password = ConvertTo-SecureString "secret" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $password
          Write-Host "RDP enabled, password set to 'secret'"

      # 2. Устанавливаем Python и websockify
      - name: Install Python and websockify
        shell: pwsh
        run: |
          if (!(Get-Command python -ErrorAction SilentlyContinue)) {
            choco install python --yes
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          }
          python -m pip install --upgrade pip
          python -m pip install websockify
          Write-Host "websockify installed"

      # 3. Клонируем noVNC
      - name: Clone noVNC
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git C:\noVNC
          Write-Host "noVNC cloned"

      # 4. Запускаем websockify для проброса RDP (3389 -> 8080)
      - name: Start websockify
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "python" -ArgumentList "-m websockify --web C:\noVNC 8080 localhost:3389"
          Start-Sleep -Seconds 3
          Write-Host "websockify running on port 8080"

      # 5. Устанавливаем cloudflared
      - name: Install cloudflared
        shell: pwsh
        run: |
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "C:\cloudflared.exe"
          Write-Host "cloudflared installed"

      # 6. Пробрасываем порт 8080 через Cloudflare
      - name: Expose via Cloudflare
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:8080 --protocol http2"
          Start-Sleep -Seconds 10
          Write-Host "============================================================"
          Write-Host "Cloudflare Tunnel is running."
          Write-Host "Look for a URL like: https://random-name.trycloudflare.com"
          Write-Host "Open in browser: https://random-name.trycloudflare.com/vnc.html"
          Write-Host "VNC password is NOT used for RDP; noVNC will show RDP login."
          Write-Host "Use: username = runneradmin, password = secret"
          Write-Host "============================================================"

      # 7. Держим раннер активным
      - name: Keep runner alive
        shell: pwsh
        run: Start-Sleep -Seconds 21600
