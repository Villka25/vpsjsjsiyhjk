name: Windows Desktop (noVNC + Cloudflare Tunnel + Data Persistence)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - name: Check Python
        shell: powershell
        run: python --version

      # Устанавливаем TightVNC Server
      - name: Install TightVNC Server
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi" -OutFile tightvnc.msi
          Start-Process msiexec.exe -Wait -ArgumentList '/i tightvnc.msi /quiet /norestart ADDLOCAL="Server"'
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -password "MySecret123"
          Start-Process "C:\Program Files\TightVNC\tvnserver.exe" -ArgumentList "-run" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      # Клонируем noVNC и устанавливаем websockify через pip
      - name: Setup noVNC and websockify
        shell: powershell
        run: |
          git clone https://github.com/novnc/noVNC.git
          pip install websockify

      # Запускаем websockify, отдающий веб-интерфейс noVNC на порту 6080 и подключающийся к VNC на 5900
      - name: Start websockify (VNC → WebSocket)
        shell: powershell
        run: |
          Start-Process -NoNewWindow -FilePath "websockify" -ArgumentList "--web=./noVNC 6080 localhost:5900" -PassThru
          Start-Sleep -Seconds 3

      # Устанавливаем cloudflared и создаём туннель до порта 6080
      - name: Install and run Cloudflare Tunnel
        shell: powershell
        run: |
          $exeUrl = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $exeUrl -OutFile "cloudflared.exe"
          Start-Process -NoNewWindow -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:6080" -PassThru
          Start-Sleep -Seconds 15
          Write-Host "============================================="
          Write-Host "Desktop is ready!"
          Write-Host "Look in the logs above for a line like:"
          Write-Host "  https://<random-name>.trycloudflare.com"
          Write-Host "Open that URL in your browser."
          Write-Host "Then click 'Connect' and enter password: MySecret123"
          Write-Host "============================================="

      # Держим сессию живой до 6 часов
      - name: Keep runner alive
        shell: powershell
        run: Start-Sleep -Seconds 21600

      # Сохраняем все пользовательские данные в архив
      - name: Save all user data to artifact
        shell: powershell
        run: |
          Write-Host "Saving your data..."
          Compress-Archive -Path C:\Users\runneradmin\* -DestinationPath C:\temp\persistent_data.zip -Force
          Write-Host "Archive created."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: persistent-data
          path: C:\temp\persistent_data.zip
          retention-days: 90
