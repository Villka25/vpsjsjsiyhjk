name: Windows noVNC (no Linux)

on:
  workflow_dispatch:
    inputs:
      archive_url:
        description: 'Ссылка на ZIP-архив с игрой (catbox.moe или другой)'
        required: true
        default: 'https://files.catbox.moe/51xx79.zip'

jobs:
  windows_vnc:
    runs-on: windows-latest
    steps:
      - name: Download and extract archive
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.archive_url }}"
          $zipPath = "$env:TEMP\game.zip"
          Write-Host "📥 Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Write-Host "📂 Extracting to C:\game"
          Expand-Archive -Path $zipPath -DestinationPath "C:\game"
          Remove-Item $zipPath
          Write-Host "✅ Game extracted to C:\game"

      - name: Install TightVNC (portable)
        shell: pwsh
        run: |
          $tvnUrl = "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi"
          $msiPath = "$env:TEMP\tightvnc.msi"
          Write-Host "📥 Downloading TightVNC"
          Invoke-WebRequest -Uri $tvnUrl -OutFile $msiPath
          Write-Host "📦 Installing TightVNC silently"
          Start-Process msiexec -ArgumentList "/i `"$msiPath`" /quiet /qn /norestart" -Wait
          Remove-Item $msiPath
          # Добавляем путь в PATH для удобства
          $env:Path += ";C:\Program Files\TightVNC"
          [Environment]::SetEnvironmentVariable("Path", $env:Path, "Machine")
          Write-Host "✅ TightVNC installed"

      - name: Setup VNC password
        shell: pwsh
        run: |
          # Устанавливаем пароль "secret"
          # TightVNC использует реестр для хранения пароля (зашифровано)
          # Создаем ключ и записываем пароль в зашифрованном виде
          # Проще использовать команду tvnserver.exe -controlapp -setpassword
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlapp -setpassword secret
          Write-Host "✅ VNC password set to 'secret'"

      - name: Start VNC server
        shell: pwsh
        run: |
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlapp -start
          Start-Sleep -Seconds 3
          Write-Host "✅ VNC server started on port 5900"

      - name: Install Python and websockify
        shell: pwsh
        run: |
          # Проверяем, есть ли Python
          if (Get-Command python -ErrorAction SilentlyContinue) {
            Write-Host "✅ Python already installed"
          } else {
            Write-Host "📥 Installing Python via Chocolatey"
            choco install python --yes
            # Добавляем Python в PATH для текущей сессии
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          }
          python -m pip install --upgrade pip
          python -m pip install websockify
          Write-Host "✅ websockify installed"

      - name: Clone noVNC
        shell: pwsh
        run: |
          git clone https://github.com/novnc/noVNC.git C:\noVNC
          Write-Host "✅ noVNC cloned to C:\noVNC"

      - name: Start websockify (noVNC)
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "python" -ArgumentList "-m websockify --web C:\noVNC 8080 localhost:5900"
          Start-Sleep -Seconds 3
          Write-Host "✅ websockify running on port 8080"

      - name: Install bore (TCP tunnel)
        shell: pwsh
        run: |
          $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
          $zipPath = "$env:TEMP\bore.zip"
          Write-Host "📥 Downloading bore"
          Invoke-WebRequest -Uri $boreUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "C:\bore"
          Remove-Item $zipPath
          Write-Host "✅ bore installed to C:\bore"

      - name: Expose port 8080 via bore
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "C:\bore\bore.exe" -ArgumentList "local 8080 --to bore.pub"
          Start-Sleep -Seconds 5
          Write-Host "============================================================"
          Write-Host "✅ bore tunnel is running"
          Write-Host ""
          Write-Host "🌐 Look in the logs above for the line:"
          Write-Host "   listening on bore.pub:XXXXX"
          Write-Host ""
          Write-Host "   Then open in your browser:"
          Write-Host "   http://bore.pub:XXXXX/vnc.html?password=secret"
          Write-Host ""
          Write-Host "🔑 VNC password: secret"
          Write-Host "📍 Your game files are in C:\game"
          Write-Host "============================================================"

      - name: Keep runner alive
        shell: pwsh
        run: |
          Write-Host "⏳ Runner will stay alive for 6 hours."
          Start-Sleep -Seconds 21600
