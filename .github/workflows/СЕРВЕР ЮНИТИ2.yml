name: ULTIMATE SPEED MODE

on:
  workflow_dispatch:
    inputs:
      game_exe:
        description: 'Имя исполняемого файла (например, MyGame.x86_64)'
        required: true
        default: 'MyGame.x86_64'
      is_windows:
        description: 'Это Windows-сборка? (true/false)'
        required: false
        default: 'false'

jobs:
  ultra_speed:
    # Максимальный CPU-раннер
    runs-on: ubuntu-latest-16-cores
    # Если нет 16-ядерного, используем 8-ядерный
    # runs-on: ubuntu-latest-8-cores

    steps:
      # 1. Установка всего необходимого для работы и оптимизации
      - name: Install system packages and optimize OS
        run: |
          sudo apt update
          sudo apt install -y \
            wget unzip \
            xvfb \
            mesa-utils \
            libgl1-mesa-dri \
            libgl1-mesa-glx \
            libglu1-mesa \
            libxrandr2 \
            libxinerama1 \
            libxcursor1 \
            libxi6 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxext6 \
            libxrender1 \
            libxtst6 \
            libdbus-glib-1-2 \
            libgtk-3-0 \
            libnss3 \
            libasound2

      # 2. Оптимизация CPU (режим производительности)
      - name: Set CPU governor to performance
        run: |
          sudo apt install -y linux-tools-common linux-tools-$(uname -r) || true
          echo "performance" | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor 2>/dev/null || true
          echo "✅ CPU governor set to performance"

      # 3. Отключение ненужных сервисов для освобождения ресурсов
      - name: Disable unnecessary services
        run: |
          sudo systemctl stop unattended-upgrades || true
          sudo systemctl disable unattended-upgrades || true
          sudo systemctl stop snapd || true
          sudo systemctl disable snapd || true
          sudo systemctl stop systemd-resolved || true
          sudo systemctl stop systemd-timesyncd || true
          echo "✅ Unnecessary services disabled"

      # 4. Создание RAM-диска для временных файлов (ускорение I/O)
      - name: Create RAM disk for temporary files
        run: |
          sudo mkdir -p /mnt/ramdisk
          sudo mount -t tmpfs -o size=4G tmpfs /mnt/ramdisk
          echo "✅ RAM disk mounted at /mnt/ramdisk"

      # 5. Скачивание и распаковка игры
      - name: Download and extract game
        run: |
          mkdir -p /mnt/ramdisk/game
          cd /mnt/ramdisk/game
          # Замените URL на вашу ссылку
          wget -O game.zip "https://files.catbox.moe/ваш_файл.zip"
          unzip -q game.zip
          rm game.zip
          echo "✅ Game extracted to /mnt/ramdisk/game"

      # 6. Настройка прав и переменных для графики
      - name: Setup graphics environment
        run: |
          export DISPLAY=:99
          export SDL_VIDEO_X11_WMCLASS="Game"
          export SDL_VIDEO_X11_NET_WM_BYPASS_COMPOSITOR=0
          echo "export DISPLAY=:99" >> ~/.bashrc

      # 7. Запуск Xvfb (виртуальный X-сервер) для работы графики
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 640x480x24 -ac -nolisten tcp -extension GLX +extension RANDR &
          sleep 3
          echo "✅ Xvfb started on :99"

      # 8. Запуск игры с максимальной оптимизацией
      - name: Launch game with ultra settings
        run: |
          cd /mnt/ramdisk/game
          chmod +x ${{ github.event.inputs.game_exe }}
          if [ "${{ github.event.inputs.is_windows }}" == "true" ]; then
            # Windows-сборка через Wine (без DXVK, т.к. он может не работать)
            sudo apt install -y wine64 wine32
            # Запуск с минимальным разрешением, программный рендеринг
            wine ${{ github.event.inputs.game_exe }} \
              -force-software-rendering \
              -screen-width 320 \
              -screen-height 240 \
              -windowed \
              -v-sync Off \
              -fps 30 \
              -quality-level 0 \
              -shadow-quality 0 \
              -texture-quality 0
          else
            # Нативная Linux-сборка
            ./${{ github.event.inputs.game_exe }} \
              -force-software-rendering \
              -screen-width 320 \
              -screen-height 240 \
              -windowed \
              -v-sync Off \
              -fps 30 \
              -quality-level 0 \
              -shadow-quality 0 \
              -texture-quality 0
          fi

      # 9. Если игра не требует графики (тест логики) — используйте этот шаг вместо предыдущего
      # - name: Launch in headless mode (no graphics)
      #   run: |
      #     cd /mnt/ramdisk/game
      #     ./${{ github.event.inputs.game_exe }} -batchmode -nographics

      # 10. Keep runner alive (для отладки или удалённого доступа)
      - name: Keep runner alive
        run: |
          echo "✅ Game is running. If you want to debug, connect via VNC or SSH."
          sleep 6h
