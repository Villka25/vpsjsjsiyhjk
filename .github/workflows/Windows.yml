name: Ubuntu Desktop (noVNC via Cloudflare Tunnel)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      # 1. Устанавливаем графическое окружение и VNC-сервер
      - name: Install desktop and VNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common

      # 2. Устанавливаем noVNC (веб-клиент VNC)
      - name: Install noVNC
        run: |
          sudo apt install -y novnc

      # 3. Устанавливаем cloudflared (Cloudflare Tunnel)
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          rm cloudflared-linux-amd64.deb

      # 4. Настраиваем пароль VNC и запускаем TigerVNC
      - name: Setup VNC password and start VNC server
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no
          sleep 3

      # 5. Запускаем noVNC, который слушает порт 6080 и подключается к VNC на порту 5901
      - name: Start noVNC
        run: |
          # noVNC будет доступен на http://localhost:6080/vnc.html?host=localhost&port=5901
          websockify --web=/usr/share/novnc 6080 localhost:5901 &
          sleep 3

      # 6. Пробрасываем порт 6080 через Cloudflare Tunnel (HTTPS)
      - name: Expose noVNC via Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:6080 &
          sleep 10
          echo "============================================="
          echo "Desktop is ready!"
          echo "Look in the logs above for a line like:"
          echo "  https://<random-name>.trycloudflare.com"
          echo "Open that URL in your browser."
          echo "VNC Password: secret"
          echo "============================================="

      # 7. Держим сессию живой до 6 часов
      - name: Keep runner alive
        run: sleep 6h
