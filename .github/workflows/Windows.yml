name: Windows Desktop (VNC via bore)

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - name: Install TightVNC Server
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi" -OutFile tightvnc.msi
          Start-Process msiexec.exe -Wait -ArgumentList '/i tightvnc.msi /quiet /norestart ADDLOCAL="Server"'

      - name: Configure and start VNC Server
        shell: powershell
        run: |
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -password "MySecret123"
          Start-Process "C:\Program Files\TightVNC\tvnserver.exe" -ArgumentList "-run" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: Open firewall port 5900
        shell: powershell
        run: |
          New-NetFirewallRule -DisplayName "Allow VNC 5900" -Direction Inbound -Protocol TCP -LocalPort 5900 -Action Allow

      - name: Download bore
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath .
          if (!(Test-Path ".\bore.exe")) { Write-Error "bore.exe not found"; exit 1 }

      - name: Expose VNC via bore
        shell: powershell
        run: |
          Write-Host "Starting bore tunnel on port 5900..."
          Start-Process -NoNewWindow -FilePath ".\bore.exe" -ArgumentList "local 5900 --to bore.pub" -PassThru
          Start-Sleep -Seconds 10
          Write-Host "============================================="
          Write-Host "To connect:"
          Write-Host "1. Open a VNC client (TightVNC Viewer, RealVNC, etc.)"
          Write-Host "2. In the logs above, find a line like:"
          Write-Host "   listening at bore.pub:12345"
          Write-Host "3. Connect to that address (bore.pub:12345)"
          Write-Host "4. Password: MySecret123"
          Write-Host "============================================="
          Write-Host "Waiting for connections... (session up to 6 hours)"

      - name: Keep runner alive
        shell: powershell
        run: Start-Sleep -Seconds 21600
