name: Ubuntu Desktop (noVNC + Cloudflare) – Final

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Install desktop, VNC, noVNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server tigervnc-common novnc

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          rm cloudflared-linux-amd64.deb

      - name: Setup VNC and start desktop
        run: |
          mkdir -p ~/.vnc
          echo "secret" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x ~/.vnc/xstartup
          vncserver :1 -geometry 1280x720 -depth 24 -localhost no
          sleep 3

      - name: Start noVNC (websockify)
        run: |
          websockify --web=/usr/share/novnc 6080 localhost:5901 &
          sleep 3

      - name: Start Cloudflare Tunnel and capture URL
        run: |
          # Запускаем туннель в фоне, вывод пишем в файл
          cloudflared tunnel --url http://localhost:6080 > /tmp/tunnel.log 2>&1 &
          # Ждём, пока в логах появится URL (максимум 20 попыток по 3 секунды)
          for i in $(seq 1 20); do
            if grep -q 'trycloudflare.com' /tmp/tunnel.log; then
              break
            fi
            sleep 3
          done
          # Извлекаем ссылку
          LINK=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "LINK=$LINK" >> $GITHUB_ENV
          echo "Tunnel link captured: $LINK"

      - name: Show final access info
        run: |
          echo "============================================="
          echo "  YOUR REMOTE DESKTOP IS READY"
          echo "============================================="
          echo "  Link:     $LINK"
          echo "  Password: secret"
          echo "============================================="
          echo "Open the link in a browser, click Connect,"
          echo "and enter the password when prompted."

      - name: Keep runner alive
        run: sleep 6h
